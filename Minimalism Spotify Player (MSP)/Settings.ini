[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1
CodePage=65001
OnRefreshAction=[!Move (((#SCREENAREAWIDTH#)/2)-320) (((#SCREENAREAHEIGHT#)/2)-280)]

[Metadata]
Name=Minimal Spotify Visualizer Settings
Author=DiBulba
Version=1.2

@include=#@#variables.inc

[Variables]
BaseX=40
AccentColor=255,255,255,255
BackgroundColor=0,0,0,180

[MeasureDevices]
Measure=Script
ScriptFile=#@#audio_devices.lua

[Background]
Meter=Image
W=640
H=640
SolidColor=#BackgroundColor#

[Title]
Meter=String
X=#BaseX#
Y=24
FontFace=Segoe UI
FontSize=20
FontColor=#AccentColor#
AntiAlias=1
Text=Settings

[SectionLabelFonts]
Meter=String
X=#BaseX#
Y=56
FontFace=Segoe UI
FontSize=11
FontColor=255,255,255,120
AntiAlias=1
Text=— Text / Fonts

[LabelTrackFont]
Meter=String
X=#BaseX#
Y=76
FontFace=Segoe UI
FontSize=13
FontColor=#AccentColor#
AntiAlias=1
Text=Track font name

[BtnTrackFont]
Meter=String
X=#BaseX#
Y=96
W=280
H=36
FontFace=Segoe UI
FontSize=14
FontColor=0,0,0,255
AntiAlias=1
SolidColor=#AccentColor#
StringAlign=Left
Padding=8,8,0,0
Text=#TrackFont#
DynamicVariables=1

[LabelTrackSize]
Meter=String
X=(#BaseX# + 298)
Y=76
FontFace=Segoe UI
FontSize=13
FontColor=#AccentColor#
AntiAlias=1
Text=Size

[BtnTrackSize]
Meter=String
X=(#BaseX# + 298)
Y=96
W=60
H=36
FontFace=Segoe UI
FontSize=14
FontColor=0,0,0,255
AntiAlias=1
SolidColor=#AccentColor#
StringAlign=Left
Padding=8,8,0,0
Text=#TrackFontSize#
DynamicVariables=1

[LabelTimeFont]
Meter=String
X=#BaseX#
Y=146
FontFace=Segoe UI
FontSize=13
FontColor=#AccentColor#
AntiAlias=1
Text=Time font name

[BtnTimeFont]
Meter=String
X=#BaseX#
Y=166
W=280
H=36
FontFace=Segoe UI
FontSize=14
FontColor=0,0,0,255
AntiAlias=1
SolidColor=#AccentColor#
StringAlign=Left
Padding=8,8,0,0
Text=#TimeFont#
DynamicVariables=1

[LabelTimeSize]
Meter=String
X=(#BaseX# + 298)
Y=146
FontFace=Segoe UI
FontSize=13
FontColor=#AccentColor#
AntiAlias=1
Text=Size

[BtnTimeSize]
Meter=String
X=(#BaseX# + 298)
Y=166
W=60
H=36
FontFace=Segoe UI
FontSize=14
FontColor=0,0,0,255
AntiAlias=1
SolidColor=#AccentColor#
StringAlign=Left
Padding=8,8,0,0
Text=#TimeFontSize#
DynamicVariables=1

[LabelHint]
Meter=String
X=#BaseX#
Y=214
W=560
FontFace=Segoe UI
FontSize=11
FontColor=255,255,255,120
AntiAlias=1
Text=Enter font name exactly as in Windows (e.g. Consolas Bold, Arial). Custom fonts: @Resources\Fonts\.
ClipString=2

[Divider]
Meter=Shape
Shape=Line 0,0,560,0 | Fill Color 255,255,255,40 | StrokeWidth 1
X=#BaseX#
Y=244

[SectionLabelAudio]
Meter=String
X=#BaseX#
Y=254
FontFace=Segoe UI
FontSize=11
FontColor=255,255,255,120
AntiAlias=1
Text=— Audio Devices

[LabelAudioCurrent]
Meter=String
X=#BaseX#
Y=276
FontFace=Segoe UI
FontSize=12
FontColor=255,255,255,200
AntiAlias=1
Text=Current: #AudioDevice#
Substitute="":"System default"
DynamicVariables=1

[BtnRefreshDevices]
Meter=String
X=460
Y=272
W=120
H=26
FontFace=Segoe UI
FontSize=11
FontColor=0,0,0,255
AntiAlias=1
SolidColor=255,255,255,200
StringAlign=Center
Text=Refresh list
LeftMouseUpAction=[!CommandMeasure MeasureDevices "RefreshDevices()"]

[BtnResetDevice]
Meter=String
X=460
Y=304
W=120
H=26
FontFace=Segoe UI
FontSize=11
FontColor=255,255,255,255
AntiAlias=1
SolidColor=160,60,60,220
StringAlign=Center
Text=Use default
LeftMouseUpAction=[!CommandMeasure MeasureDevices "ResetDevice()"]

[DeviceBtn1]
Meter=String
X=#BaseX#
Y=308
W=410
H=28
