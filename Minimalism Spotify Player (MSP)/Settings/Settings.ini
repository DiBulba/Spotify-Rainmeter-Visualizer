[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1
CodePage=65001
OnRefreshAction=[!Move (#SCREENAREAWIDTH#/2)-320 (#SCREENAREAHEIGHT#/2)-200]
SkinWidth=640
SkinHeight=400

[Metadata]
Name=Minimal Spotify Visualizer Settings
Author=DiBulba
Version=1.1

[Variables]
@include=#@#variables.inc
BaseX=40
AccentColor=255,255,255,255
BackgroundColor=0,0,0,180

[mInputTrackFont]
Measure=Plugin
Plugin=InputText
W=280
H=36
X=(#BaseX# + 8)
Y=88
SolidColor=#AccentColor#
FontColor=0,0,0,255
StringAlign=Left
FontFace=Segoe UI
FontSize=14
Command1=[!WriteKeyValue Variables TrackFont "$UserInput$" "#@#variables.inc"][!Refresh "Minimalizm_Spotify_Visualizer" "MinimalSpotifyVisualizer.ini"]

[mInputTrackSize]
Measure=Plugin
Plugin=InputText
W=60
H=36
X=(#BaseX# + 298)
Y=88
SolidColor=#AccentColor#
FontColor=0,0,0,255
StringAlign=Left
FontFace=Segoe UI
FontSize=14
Command1=[!WriteKeyValue Variables TrackFontSize "$UserInput$" "#@#variables.inc"][!Refresh "Minimalizm_Spotify_Visualizer" "MinimalSpotifyVisualizer.ini"]

[mInputTimeFont]
Measure=Plugin
Plugin=InputText
W=280
H=36
X=(#BaseX# + 8)
Y=168
SolidColor=#AccentColor#
FontColor=0,0,0,255
StringAlign=Left
FontFace=Segoe UI
FontSize=14
Command1=[!WriteKeyValue Variables TimeFont "$UserInput$" "#@#variables.inc"][!Refresh "Minimalizm_Spotify_Visualizer" "MinimalSpotifyVisualizer.ini"]

[mInputTimeSize]
Measure=Plugin
Plugin=InputText
W=60
H=36
X=(#BaseX# + 298)
Y=168
SolidColor=#AccentColor#
FontColor=0,0,0,255
StringAlign=Left
FontFace=Segoe UI
FontSize=14
Command1=[!WriteKeyValue Variables TimeFontSize "$UserInput$" "#@#variables.inc"][!Refresh "Minimalizm_Spotify_Visualizer" "MinimalSpotifyVisualizer.ini"]

[Background]
Meter=Image
W=640
H=400
SolidColor=#BackgroundColor#

[Title]
Meter=String
X=#BaseX#
Y=30
FontFace=Segoe UI
FontSize=20
FontColor=#AccentColor#
AntiAlias=1
Text=Settings

[LabelTrackFont]
Meter=String
X=#BaseX#
Y=68
FontFace=Segoe UI
FontSize=13
FontColor=#AccentColor#
AntiAlias=1
Text=Track font name

[BtnTrackFont]
Meter=String
X=#BaseX#
Y=88
W=280
H=36
FontFace=Segoe UI
FontSize=14
FontColor=0,0,0,255
AntiAlias=1
SolidColor=#AccentColor#
StringAlign=Left
Padding=8,8,0,0
Text=#TrackFont#
LeftMouseUpAction=[!CommandMeasure "mInputTrackFont" "ExecuteBatch 1"]
DynamicVariables=1

[LabelTrackSize]
Meter=String
X=(#BaseX# + 298)
Y=68
FontFace=Segoe UI
FontSize=13
FontColor=#AccentColor#
AntiAlias=1
Text=Size

[BtnTrackSize]
Meter=String
X=(#BaseX# + 298)
Y=88
W=60
H=36
FontFace=Segoe UI
FontSize=14
FontColor=0,0,0,255
AntiAlias=1
SolidColor=#AccentColor#
StringAlign=Left
Padding=8,8,0,0
Text=#TrackFontSize#
LeftMouseUpAction=[!CommandMeasure "mInputTrackSize" "ExecuteBatch 1"]
DynamicVariables=1

[LabelTimeFont]
Meter=String
X=#BaseX#
Y=148
FontFace=Segoe UI
FontSize=13
FontColor=#AccentColor#
AntiAlias=1
Text=Time font name

[BtnTimeFont]
Meter=String
X=#BaseX#
Y=168
W=280
H=36
FontFace=Segoe UI
FontSize=14
FontColor=0,0,0,255
AntiAlias=1
SolidColor=#AccentColor#
StringAlign=Left
Padding=8,8,0,0
Text=#TimeFont#
LeftMouseUpAction=[!CommandMeasure "mInputTimeFont" "ExecuteBatch 1"]
DynamicVariables=1

[LabelTimeSize]
Meter=String
X=(#BaseX# + 298)
Y=148
FontFace=Segoe UI
FontSize=13
FontColor=#AccentColor#
AntiAlias=1
Text=Size

[BtnTimeSize]
Meter=String
X=(#BaseX# + 298)
Y=168
W=60
H=36
FontFace=Segoe UI
FontSize=14
FontColor=0,0,0,255
AntiAlias=1
SolidColor=#AccentColor#
StringAlign=Left
Padding=8,8,0,0
Text=#TimeFontSize#
LeftMouseUpAction=[!CommandMeasure "mInputTimeSize" "ExecuteBatch 1"]
DynamicVariables=1

[LabelHint]
Meter=String
X=#BaseX#
Y=222
W=560
FontFace=Segoe UI
FontSize=11
FontColor=255,255,255,120
AntiAlias=1
ClipString=0
Text=Enter the font name exactly as it appears in Windows (e.g. Consolas Bold, Arial, Segoe UI).
ClipString=2

[LabelHintFonts]
Meter=String
X=#BaseX#
Y=248
W=560
FontFace=Segoe UI
FontSize=11
FontColor=255,255,255,120
AntiAlias=1
Text=Custom fonts: place .ttf or .otf file in @Resources\Fonts\ folder.
ClipString=2

[BtnClose]
Meter=String
X=500
Y=340
W=100
H=40
FontFace=Segoe UI
FontSize=14
FontColor=#AccentColor#
AntiAlias=1
StringAlign=Center
SolidColor=0,100,0,220
Text=Close
LeftMouseUpAction=[!DeactivateConfig]
