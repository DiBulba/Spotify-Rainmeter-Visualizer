; ══════════════════════════════════════════
;  ФОН
; ══════════════════════════════════════════
[MeterBackground]
Meter=Shape
Shape=Rectangle 0,0,#Width#,#Height#,12 | Fill Color #BackgroundColor# | StrokeWidth 0
X=0
Y=0
DynamicVariables=1

; ══════════════════════════════════════════
;  ОБЛОЖКА со скруглёнными углами через Shape+Image комбо
;  X=8, Y=(130-64)/2=33
; ══════════════════════════════════════════

[MeterCover]
Meter=Image
ImageName=[MeasureCover]
Container=MeterCoverContainer
W=#CoverSize#
H=#CoverSize#
X=#CoverPad#
Y=30
MaskImageName=#CURRENTPATH#covermask.png
MaskImageAlpha=255
PreserveAspectRatio=1
DynamicVariables=1
AntiAlias=1

; ══════════════════════════════════════════
;  ТЕКСТ
; ══════════════════════════════════════════
[MeterTrackInfo]
Meter=String
X=222
Y=8
W=284
H=22
FontFace=Consolas Bold
FontSize=10
FontColor=#FontColor#
AntiAlias=1
ClipString=1
StringAlign=Center
Text="%1 - %2"
MeasureName=MeasureArtist
MeasureName2=MeasureTitle
ToolTipText="%1 - %2"
ToolTipWidth=300
ToolTipTitle=Now Playing
DynamicVariables=1

[MeterTime]
Meter=String
X=222
Y=30
FontFace=Arial
FontSize=8
FontColor=#FontColor#
AntiAlias=1
StringAlign=Center
Text=[CalcPosMin]:[FormatPosSec] / [CalcDurMin]:[FormatDurSec]
DynamicVariables=1

; ══════════════════════════════════════════
;  КНОПКИ
; ══════════════════════════════════════════
[MeterPrevious]
Meter=String
X=170
Y=57.5
FontFace=Font Awesome 6 Free Solid
FontSize=12
FontColor=#FontColor#,#ButtonAlpha#
AntiAlias=1
Text=[\xf048]
LeftMouseUpAction=[!CommandMeasure MeasureWNP "Previous"]
MouseOverAction=[!SetOption MeterPrevious FontColor "#FontColor#,255"][!UpdateMeter MeterPrevious][!Redraw]
MouseLeaveAction=[!SetOption MeterPrevious FontColor "#FontColor#,#ButtonAlpha#"][!UpdateMeter MeterPrevious][!Redraw]
DynamicVariables=1

[MeterPlayPause]
Meter=String
X=215
Y=57.5
FontFace=Font Awesome 6 Free Solid
FontSize=12
FontColor=#FontColor#,#ButtonAlpha#
AntiAlias=1
Text=[\xf04b]
LeftMouseUpAction=[!CommandMeasure MeasureWNP "PlayPause"]
MouseOverAction=[!SetOption MeterPlayPause FontColor "#FontColor#,255"][!UpdateMeter MeterPlayPause][!Redraw]
MouseLeaveAction=[!SetOption MeterPlayPause FontColor "#FontColor#,#ButtonAlpha#"][!UpdateMeter MeterPlayPause][!Redraw]
DynamicVariables=1

[MeterNext]
Meter=String
X=260
Y=57.5
FontFace=Font Awesome 6 Free Solid
FontSize=12
FontColor=#FontColor#,#ButtonAlpha#
AntiAlias=1
Text=[\xf051]
LeftMouseUpAction=[!CommandMeasure MeasureWNP "Next"]
MouseOverAction=[!SetOption MeterNext FontColor "#FontColor#,255"][!UpdateMeter MeterNext][!Redraw]
MouseLeaveAction=[!SetOption MeterNext FontColor "#FontColor#,#ButtonAlpha#"][!UpdateMeter MeterNext][!Redraw]
DynamicVariables=1

; ══════════════════════════════════════════
;  АУДИО БАРЫ — используем MeterStyle как в оригинале
;  Бары растут вверх от Y=118, высота до 35px
;  MeterSeparation авто-расставляет бары горизонтально
; ══════════════════════════════════════════
[MeterBarBase]
Meter=Shape
X=80
Y=118
DynamicVariables=1
Hidden=1

[MeterBar1]
Meter=Shape
MeterStyle=MeterBarBase
X=86
Y=115
Shape=Rectangle 0,0,(#BarW#),(-(#BarH#-#BarW#)*[MeasureAudio1]-#BarW#),(#BarW#/2) | Fill Color #BarColor# | StrokeWidth 0
DynamicVariables=1

[MeterBar2]
Meter=Shape
X=(86 + 0.65*(#BarW# + #BarSpace#))
Y=115
Shape=Rectangle 0,0,(#BarW#),(-(#BarH#-#BarW#)*[MeasureAudio2]-#BarW#),(#BarW#/2) | Fill Color #BarColor# | StrokeWidth 0
DynamicVariables=1

[MeterBar3]
