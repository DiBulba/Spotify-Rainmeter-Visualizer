[Rainmeter]
WindowX=10R
WindowY=10
Update=16
AccurateText=1
DynamicWindowSize=1
CodePage=65001

[Metadata]
Name=Minimal Spotify Visualizer
Author=DiBulba
Version=1.0

@include=#@#variables.inc

; ══════════════════════════════════════════
;  WebNowPlaying
; ══════════════════════════════════════════
[MeasureWNP]
Measure=Plugin
Plugin=WebNowPlaying
PlayerType=STATE
IfCondition=(MeasureWNP = 1)
IfTrueAction=[!SetOption MeterPlayPause Text "[\xf04c]"][!UpdateMeter MeterPlayPause][!Redraw]
IfFalseAction=[!SetOption MeterPlayPause Text "[\xf04b]"][!UpdateMeter MeterPlayPause][!Redraw]
DynamicVariables=1

[MeasureTitle]
Measure=Plugin
Plugin=WebNowPlaying
PlayerType=TITLE
Substitute="":"No track"

[MeasureArtist]
Measure=Plugin
Plugin=WebNowPlaying
PlayerType=ARTIST
Substitute="":"Unknown"

[MeasurePosition]
Measure=Plugin
Plugin=WebNowPlaying
PlayerType=POSITION

[MeasureDuration]
Measure=Plugin
Plugin=WebNowPlaying
PlayerType=DURATION

[MeasureProgress]
Measure=Plugin
Plugin=WebNowPlaying
PlayerType=PROGRESS

[MeasureCover]
Measure=Plugin
Plugin=WebNowPlaying
PlayerType=COVER
CoverPath=#CURRENTPATH#cover.png
DefaultPath=#CURRENTPATH#cover.png
OnChangeAction=[!UpdateMeter MeterCover][!Redraw]

; --- Время ---
[CalcPosMin]
Measure=Calc
Formula=Floor(MeasurePosition / 60)
DynamicVariables=1

[CalcPosSec]
Measure=Calc
Formula=MeasurePosition % 60
DynamicVariables=1

[CalcDurMin]
Measure=Calc
Formula=Floor(MeasureDuration / 60)
DynamicVariables=1

[CalcDurSec]
Measure=Calc
Formula=MeasureDuration % 60
DynamicVariables=1

[FormatPosSec]
Measure=String
String=[CalcPosSec]
DynamicVariables=1
RegExpSubstitute=1
Substitute="^(\d)$":"0\1"

[FormatDurSec]
Measure=String
String=[CalcDurSec]
DynamicVariables=1
RegExpSubstitute=1
Substitute="^(\d)$":"0\1"

[CalcProgressPx]
Measure=Calc
Formula=(#ProgW#) * (MeasureProgress / 100)
DynamicVariables=1

; ══════════════════════════════════════════
;  AUDIO LEVEL — с правильными FFT настройками
; ══════════════════════════════════════════
[MeasureAudioOutput]
Measure=Plugin
Plugin=AudioLevel
Port=Output
FFTSize=4096
FFTOverlap=2048
FFTAttack=85
FFTDecay=30
FreqMin=20
FreqMax=1650
Sensitivity=80
Bands=30

[MeasureAudio1]
Measure=Plugin
Plugin=AudioLevel
Parent=MeasureAudioOutput
Type=Band
BandIdx=1
AverageSize=2.5

